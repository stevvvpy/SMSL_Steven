name: Data Preprocessing Workflow

on:
  push:
    branches:
     - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Preprocessing Script
      run: python preprocessing/automate_Steven.py

    - name: Commit and Push Processed Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add preprocessing/Student_performance_dataset_preprocessing/
        git commit -m "Auto-update: Hasil preprocessing data" || echo "Tidak ada perubahan data"
        git push